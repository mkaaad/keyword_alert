name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.29.x'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973 cmake;3.22.1'

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Download model
        run: bash setup.sh

      - name: Analyze & test
        run: |
          flutter pub get
          flutter analyze
          flutter test

      - name: Build APK
        run: |
          set -euo pipefail
          # arm64-only: smaller package
          flutter build apk --release --target-platform android-arm64
          APK=build/app/outputs/flutter-apk/app-release.apk
          if [ ! -f "$APK" ]; then
            echo "Expected APK missing: $APK"
            find build -name "*.apk" -type f 2>/dev/null || true
            exit 1
          fi
          ls -lh "$APK"
          echo "APK_PATH=$APK" >> "$GITHUB_ENV"

      - name: Package dual artifacts (user APK + Magisk zip)
        run: |
          set -euo pipefail
          APK="${APK_PATH:-build/app/outputs/flutter-apk/app-release.apk}"
          [ -f "$APK" ] || { echo "APK not found: $APK"; exit 1; }

          # 1) User / sideload APK (no Root; MediaProjection capture)
          cp -f "$APK" keyword_alert-user.apk
          ls -lh keyword_alert-user.apk

          # 2) Magisk module (priv-app + pre-extracted arm64 libs)
          bash scripts/package_magisk.sh "$APK"
          ls -lh keyword_alert_magisk.zip

          echo "USER_APK=keyword_alert-user.apk" >> "$GITHUB_ENV"
          echo "MAGISK_ZIP=keyword_alert_magisk.zip" >> "$GITHUB_ENV"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            keyword_alert-user.apk
            keyword_alert_magisk.zip
          body: |
            ## 两种安装方式（同一套构建）

            | 文件 | 适用 | 说明 |
            |------|------|------|
            | `keyword_alert-user.apk` | 普通安装 | **无需 Root**。开始监控时允许「屏幕录制/投射」以捕获 B站/会议声音。 |
            | `keyword_alert_magisk.zip` | Magisk 模块 | priv-app + 预解压 `lib/arm64`。可系统权限 / REMOTE 兜底；刷入后需重启。 |

            模型已打进包内。arm64-v8a only。
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: keyword_alert-artifacts
          path: |
            keyword_alert-user.apk
            keyword_alert_magisk.zip
