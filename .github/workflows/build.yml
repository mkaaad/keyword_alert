name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.29.x'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973'

      - name: Download model
        run: bash setup.sh

      - name: Analyze & test
        run: |
          flutter pub get
          flutter analyze
          flutter test

      - name: Build APK
        run: |
          flutter build apk --release
          echo "Build output:"
          find build -name "*.apk" -type f

      - name: Package Magisk module
        run: |
          MODULE_DIR="magisk_module"
          mkdir -p "$MODULE_DIR/system/priv-app/KeywordAlert"
          APK=$(find build -name "*.apk" -path "*/release/*" | head -1)
          [ -z "$APK" ] && APK=$(find build -name "*.apk" | head -1)
          [ -z "$APK" ] && { echo "No APK found"; find build -name "*.apk" -type f; exit 1; }
          cp "$APK" "$MODULE_DIR/system/priv-app/KeywordAlert/KeywordAlert.apk"
          cd "$MODULE_DIR"
          zip -r ../keyword_alert_magisk.zip . -x "*.DS_Store"
          cd ..
          echo "ZIP_SIZE=$(du -h keyword_alert_magisk.zip | cut -f1)" >> "$GITHUB_ENV"
          ls -lh keyword_alert_magisk.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: keyword_alert_magisk.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Magisk zip (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: keyword_alert_magisk
          path: keyword_alert_magisk.zip
