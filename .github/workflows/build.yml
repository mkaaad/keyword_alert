name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.29.x'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973 cmake;3.22.1'

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Download model
        run: bash setup.sh

      - name: Analyze & test
        run: |
          flutter pub get
          flutter analyze
          flutter test

      - name: Build APK
        run: |
          set -euo pipefail
          # arm64-only: smaller package; OnePlus Ace 3 is arm64-v8a
          flutter build apk --release --target-platform android-arm64
          APK=build/app/outputs/flutter-apk/app-release.apk
          if [ ! -f "$APK" ]; then
            echo "Expected APK missing: $APK"
            find build -name "*.apk" -type f 2>/dev/null || true
            exit 1
          fi
          ls -lh "$APK"
          echo "APK_PATH=$APK" >> "$GITHUB_ENV"

      - name: Package Magisk module
        run: |
          set -euo pipefail
          # Extracts lib/arm64-v8a/*.so into priv-app/.../lib/arm64/ (required
          # for system installs — PM does not extract APK native libs for Magisk).
          bash scripts/package_magisk.sh "${APK_PATH:-build/app/outputs/flutter-apk/app-release.apk}"
          ls -lh keyword_alert_magisk.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: keyword_alert_magisk.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Magisk zip (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: keyword_alert_magisk
          path: keyword_alert_magisk.zip
