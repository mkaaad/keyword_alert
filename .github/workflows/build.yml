name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.29.x'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973 cmake;3.22.1'

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Download model
        run: bash setup.sh

      - name: Analyze & test
        run: |
          flutter pub get
          flutter analyze
          flutter test

      - name: Build APK
        run: |
          set -euo pipefail
          # Prefer flutter CLI (uses build/app/outputs/flutter-apk after build-dir redirect).
          # Fall back to Gradle directly and collect any APK if Flutter's locator fails.
          if ! flutter build apk --release; then
            echo "::warning::flutter build apk reported failure; trying Gradle assembleRelease + APK discovery"
            (cd android && ./gradlew :app:assembleRelease --stacktrace)
          fi

          echo "=== APK search ==="
          find build android -name "*.apk" -type f 2>/dev/null || true

          # Canonical path expected by Flutter tooling
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            APK=build/app/outputs/flutter-apk/app-release.apk
          else
            APK=$(find build android -name "app-release.apk" -type f 2>/dev/null | head -1 || true)
          fi
          if [ -z "${APK:-}" ]; then
            APK=$(find build android -name "*.apk" -type f 2>/dev/null | head -1 || true)
          fi
          [ -n "${APK:-}" ] || { echo "No APK produced"; exit 1; }

          # Normalize to the canonical Flutter APK path (skip if already there).
          DEST=build/app/outputs/flutter-apk/app-release.apk
          mkdir -p "$(dirname "$DEST")"
          SRC_REAL=$(realpath "$APK")
          DEST_REAL=$(realpath -m "$DEST")
          if [ "$SRC_REAL" != "$DEST_REAL" ]; then
            cp -f "$APK" "$DEST"
          fi
          ls -lh "$DEST"
          echo "APK_PATH=$DEST" >> "$GITHUB_ENV"

      - name: Package Magisk module
        run: |
          set -euo pipefail
          MODULE_DIR="magisk_module"
          mkdir -p "$MODULE_DIR/system/priv-app/KeywordAlert"
          APK="${APK_PATH:-build/app/outputs/flutter-apk/app-release.apk}"
          [ -f "$APK" ] || APK=$(find build android -name "*.apk" -type f | head -1)
          [ -n "$APK" ] && [ -f "$APK" ] || { echo "No APK found"; find build android -name "*.apk" -type f || true; exit 1; }
          cp "$APK" "$MODULE_DIR/system/priv-app/KeywordAlert/KeywordAlert.apk"
          echo "Packaged APK: $APK ($(du -h "$MODULE_DIR/system/priv-app/KeywordAlert/KeywordAlert.apk" | cut -f1))"
          cd "$MODULE_DIR"
          zip -r ../keyword_alert_magisk.zip . -x "*.DS_Store"
          cd ..
          ls -lh keyword_alert_magisk.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: keyword_alert_magisk.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Magisk zip (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: keyword_alert_magisk
          path: keyword_alert_magisk.zip
