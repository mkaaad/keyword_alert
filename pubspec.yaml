name: keyword_alert
description: "Tencent Meeting keyword frequency monitor - alarm when '老师' is detected too often"
publish_to: 'none'
version: 0.2.0+2002

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.1.0
  flutter_local_notifications: ^18.0.0
  flutter_foreground_task: ^8.15.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/models/
